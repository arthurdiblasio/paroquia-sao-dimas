version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: paroquia-postgres
    restart: always
    ports:
      - "5431:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: paroquia_sao_dimas
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: